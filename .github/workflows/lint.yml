# This workflow runs code formatting and linting checks

name: Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      UV_NO_SOURCES: "1"

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true  # needed so hatch-vcs can resolve a version from git tags
    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: "3.13"
    - name: Install
      run: uv sync --group lint
    - name: Check code formatting
      run: |
        make format
    - name: Check for file changes
      run: |
        make check-clean
    - name: Lint
      run: |
        make lint
